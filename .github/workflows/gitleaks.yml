name: Gitleaks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Run the free, MIT-licensed gitleaks CLI directly. The gitleaks-action
      # wrapper requires a paid GITLEAKS_LICENSE for organization-owned repos,
      # but the binary itself is free — so we install and run it ourselves.
      #
      # The downloaded tarball is verified against a pinned SHA-256 BEFORE it is
      # unpacked or executed, so a tampered/substituted release cannot run code
      # in CI. Bump GITLEAKS_VERSION and GITLEAKS_SHA256 together (the checksum
      # is published at .../releases/download/v<ver>/gitleaks_<ver>_checksums.txt).
      - name: Run Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
