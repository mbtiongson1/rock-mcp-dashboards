name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language:
          - javascript-typescript

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          # The OAuth/MCP/DCR route handlers are rate-limited via a custom
          # Redis-backed limiter (RateLimiter / DcrRateLimiter) plus Vercel edge
          # controls. CodeQL's js/missing-rate-limiting query only recognizes a
          # few specific middleware libraries, so it false-positives on every PR
          # that touches a route handler. Exclude it; genuine rate-limiting
          # coverage is enforced and reviewed in code.
          config: |
            query-filters:
              - exclude:
                  id: js/missing-rate-limiting

      - name: Autobuild
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
