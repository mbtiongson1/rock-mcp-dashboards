name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22']

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        # Run both tsconfigs (app + server). The server config (tsconfig.server.json)
        # covers src/ — checking only tsconfig.json previously let server-only type
        # breakage (e.g. from major dependency bumps) pass CI undetected.
        run: pnpm typecheck

      - name: Run tests
        # Integration tests are guarded with it.runIf(hasEnv) and skip cleanly without Rock env vars.
        # CI intentionally excludes ROCK_PUBLIC_URL and ROCK_API_KEY, so integration tests skip.
        run: pnpm vitest run
